# Codemagic CI/CD configuration for KalmFu Panda
# Minimal config - let Codemagic UI handle code signing
workflows:
  ios-workflow:
    name: iOS App Store Build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
    publishing:
      app_store_connect:
        apple_id: anupatwritnun@gmail.com
        issuer_id: d1d4fd43-48c1-4027-ae88-b3651d497396
        key_id: HX3GW7MKG2
        submit_to_testflight: false
        submit_to_app_store: false
